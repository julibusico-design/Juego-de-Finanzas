var ALL_QS=[
  {t:"¿Qué es un instrumento financiero?",o:["a) Un objeto físico que el banco entrega como garantía de un préstamo","b) Un contrato que mueve dinero en el tiempo entre quien lo necesita y quien lo tiene disponible","c) Un impuesto que cobra la CNV por operar en el mercado","d) Un tipo de cuenta bancaria exclusiva para empresas"],c:1,exp:"Un instrumento financiero es, ante todo, un contrato: fija cuánto, cuándo y a qué precio se mueve el dinero entre dos partes. No es un objeto físico, ni un impuesto, ni un tipo de cuenta — es el papel que formaliza el trato.",svi:0},
  {t:"¿Qué representa la tasa de interés?",o:["a) El precio del dinero: lo que se cobra por prestarlo o se paga por pedirlo prestado","b) El porcentaje de IVA que se cobra en toda operación financiera","c) La comisión fija que cobra la CNV por cada instrumento emitido","d) El tipo de cambio oficial entre el peso y el dólar"],c:0,exp:"La tasa de interés compensa tres cosas: la inflación esperada, el riesgo de que no te paguen, y el tiempo que vas a estar sin esa plata. No tiene que ver con el IVA, ni con la CNV, ni con el tipo de cambio.",svi:1},
  {t:"¿Qué significa 'riesgo' en una inversión?",o:["a) Que la inversión seguro va a perder valor","b) La incertidumbre sobre si vas a cobrar lo esperado, cuándo lo esperabas","c) El monto mínimo que exige la CNV para invertir","d) La cantidad de impuestos que paga un instrumento"],c:1,exp:"Riesgo no es sinónimo de 'te va a ir mal': es no saber con certeza qué va a pasar. Por eso a mayor riesgo asumido, mayor rendimiento se exige a cambio — es la forma de compensar esa incertidumbre.",svi:2},
  {t:"¿Para qué sirve una ALyC?",o:["a) Es el organismo que cobra los impuestos sobre las inversiones","b) Es el intermediario habilitado para comprar y vender instrumentos en tu nombre en el mercado","c) Es una cuenta bancaria especial que paga más intereses","d) Es el seguro que cubre tu dinero si el mercado cae"],c:1,exp:"ALyC significa Agente de Liquidación y Compensación. Es la puerta de entrada al mercado: no se puede operar directo en la bolsa, hace falta un intermediario habilitado que ejecute las operaciones en tu nombre.",svi:3},
  {t:"¿Quién autoriza y supervisa a las ALyC?",o:["a) El BCRA","b) La SSN","c) La CNV","d) ANSES"],c:2,exp:"La CNV (Comisión Nacional de Valores) es quien autoriza, supervisa y puede sancionar a las ALyC. El BCRA regula bancos, la SSN regula seguros, y ANSES administra la jubilación.",svi:4},
  {t:"¿Qué es BYMA?",o:["a) Un tipo de Fondo Común de Inversión","b) El organismo que regula los seguros de vida","c) Donde efectivamente se cruzan las puntas de compra y venta del mercado","d) Una billetera virtual para pagar servicios"],c:2,exp:"BYMA (Bolsas y Mercados Argentinos) es el mercado en sí: el lugar donde se ejecutan las operaciones que tu ALyC manda. La CNV regula; BYMA opera.",svi:5},
  {t:"¿Qué es un Plazo Fijo?",o:["a) Comprar una parte de una empresa que cotiza en bolsa","b) Depositar tu dinero en un banco por un plazo pactado a cambio de una tasa de interés fija","c) Un contrato para comprar dólares a futuro","d) Un préstamo de un día entre dos inversores con garantía"],c:1,exp:"El Plazo Fijo es el instrumento de renta fija más conocido: depositás, el banco te paga una tasa pactada de antemano, y al vencimiento recuperás capital más intereses. La opción a describe una acción, la c un futuro, la d una caución.",svi:6},
  {t:"¿Qué diferencia al Plazo Fijo UVA del tradicional?",o:["a) El UVA paga en dólares directamente","b) El UVA ajusta el capital por inflación y además paga una tasa adicional","c) El UVA no tiene plazo mínimo de 30 días","d) El UVA lo emite la CNV en vez de un banco"],c:1,exp:"El plazo fijo UVA actualiza el capital según la inflación (a través de la Unidad de Valor Adquisitivo) y le suma una tasa extra. El tradicional paga una tasa fija en pesos, sin ese ajuste.",svi:7},
  {t:"¿Qué es una Letra del Tesoro, como una LECAP?",o:["a) Un préstamo de corto plazo a una empresa privada","b) Un préstamo de corto plazo al Estado Nacional para financiarse","c) Una acción preferencial sin derecho a voto","d) Un certificado que representa una acción extranjera"],c:1,exp:"Las Letras del Tesoro son deuda de corto plazo (semanas o meses) que emite el Estado Nacional. La LECAP paga una tasa fija en pesos; la LECER ajusta por inflación a través del CER.",svi:8},
  {t:"¿Qué son las Cauciones Bursátiles?",o:["a) Un préstamo de muy corto plazo entre dos inversores, con instrumentos como garantía","b) Un impuesto que se paga al vender una acción","c) El seguro obligatorio que exige la CNV para operar en bolsa","d) Una comisión que cobra BYMA por cada operación"],c:0,exp:"La caución es como un plazo fijo express del mercado: un inversor pone el dinero, el otro entrega una garantía (acciones o bonos), y en pocos días se devuelve el capital más un interés. Es de las opciones más líquidas y de menor riesgo que existen.",svi:9},
  {t:"¿Qué es un CEDEAR?",o:["a) Un bono que emite el Estado en dólares","b) Un certificado que representa una acción extranjera, pero se compra y vende en pesos en el mercado local","c) Un Fondo Común de Inversión que solo invierte en plazos fijos","d) Una obligación negociable emitida en el exterior"],c:1,exp:"El CEDEAR permite invertir en empresas que cotizan afuera (como grandes tecnológicas) sin abrir una cuenta en el exterior. Como representa algo que cotiza en otro país, también expone al tipo de cambio.",svi:10},
  {t:"¿Para qué se usan los Futuros y Opciones?",o:["a) Para abrir una cuenta en una ALyC","b) Para cubrirse de un riesgo de precio futuro o para especular sobre hacia dónde va a ir ese precio","c) Para depositar dinero a un plazo fijo en dólares","d) Para calcular el impuesto a las ganancias de una inversión"],c:1,exp:"Son contratos para comprar o vender algo (el dólar, un índice, una acción) a un precio fijado hoy, pero en una fecha futura. Sirven para cobertura (protegerse) o para especulación (apostar a un movimiento de precio). Son instrumentos avanzados, de riesgo muy alto.",svi:11},
  {t:"Comprás $10.000 de una acción con una comisión del 0,5% + IVA. ¿Sobre qué se aplica el 21% de IVA?",o:["a) Sobre los $10.000 de la operación completa","b) Sobre la comisión que cobra la ALyC, no sobre el monto de la operación","c) Sobre las ganancias que tuviste con la inversión","d) El IVA no se aplica nunca en el mercado de capitales"],c:1,exp:"Comprar el instrumento en sí no tiene IVA. Lo que sí tiene IVA es el servicio que cobra la ALyC: la comisión. Por eso el 21% sobre $50 de comisión son apenas $10,50 — no 21% sobre los $10.000.",svi:12},
  {t:"¿Cuál es la diferencia entre tasa fija y tasa variable?",o:["a) La tasa fija solo existe en dólares; la variable solo en pesos","b) Con tasa fija sabés de antemano cuánto vas a cobrar; con tasa variable depende del precio de mercado","c) La tasa variable siempre rinde más que la fija","d) La tasa fija la fija el BCRA y la variable la fija la CNV"],c:1,exp:"En renta fija (plazo fijo, ON, bono a tasa fija) sabés desde el día uno cuánto vas a cobrar si llegás al vencimiento. En renta variable (acciones, FCI de renta variable) el resultado depende del mercado: podés ganar más, o perder.",svi:13},
  {t:"¿Qué diferencia hay entre TNA y TEA?",o:["a) Son exactamente lo mismo, solo cambia el nombre","b) La TNA es la tasa de cartel sin reinversión; la TEA sí contempla el interés compuesto, por eso suele ser mayor","c) La TNA se usa para dólares y la TEA para pesos","d) La TEA la regula la CNV y la TNA el BCRA"],c:1,exp:"La Tasa Nominal Anual (TNA) es la tasa publicada, sin considerar que los intereses se reinviertan. La Tasa Efectiva Anual (TEA) sí suma ese efecto de interés compuesto — por eso, para el mismo instrumento, la TEA casi siempre es un poco más alta que la TNA.",svi:14},
  {t:"En la jerga de una ALyC, ¿qué es el 'comitente'?",o:["a) El nombre del instrumento que más se opera ese día","b) El número de cuenta que te identifica como cliente de la ALyC","c) El impuesto que se paga al abrir una cuenta","d) El gerente que administra un Fondo Común de Inversión"],c:1,exp:"Cuando abrís una cuenta en una ALyC, te asignan un número de comitente: es tu identificación como cliente dentro de esa cuenta. Lo vas a ver en cada boleto y en el estado de cuenta.",svi:15},
  {t:"¿Qué es el 'spread' de un instrumento?",o:["a) La ganancia total que tuvo un fondo en el último año","b) La diferencia entre el precio al que alguien quiere comprar y al que alguien quiere vender","c) El porcentaje de comisión que cobra la ALyC por cada operación","d) El tiempo que tarda en liquidarse una operación (T+1, T+2)"],c:1,exp:"El spread es la brecha entre la punta compradora (lo máximo que alguien ofrece pagar) y la punta vendedora (lo mínimo que alguien acepta cobrar). Cuanto más líquido es un instrumento, más chico suele ser ese spread.",svi:16}
];

`<svg viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block"><rect width="640" height="220" fill="#FCE4EC"/><rect x="70" y="80" width="170" height="80" rx="8" fill="#E6F9EC" stroke="#27500A" stroke-width="2"/><text x="155" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="700">PUNTA COMPRADORA</text><text x="155" y="138" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1B5E20" font-weight="700">$100</text><rect x="400" y="80" width="170" height="80" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2"/><text x="485" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#791F1F" font-weight="700">PUNTA VENDEDORA</text><text x="485" y="138" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#791F1F" font-weight="700">$102</text><line x1="245" y1="120" x2="395" y2="120" stroke="#880E4F" stroke-width="2.5" stroke-dasharray="6,4"/><rect x="260" y="100" width="120" height="24" rx="5" fill="#880E4F"/><text x="320" y="117" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">SPREAD = $2</text><text x="320" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#880E4F" font-weight="700">El spread: diferencia entre precio de compra y de venta</text></svg>`
];

var S={
  phase:"setup",
  numTeams:4,
  teams:["Equipo 1","Equipo 2","Equipo 3","Equipo 4"],
  scores:[0,0,0,0],
  coins:[["vida","cambio","x2"],["vida","cambio","x2"],["vida","cambio","x2"],["vida","cambio","x2"]],
  ri:0,
  bets:[1,1,1,1],
  activeCoins:[null,null,null,null],
  teamAnswers:[null,null,null,null],
  revealed:false,
  postCorrect:null,
  impSub:0,
  impVotes:{},
  impPhase:"show",
  explainImg:null,
  explainQ:null
};

var CLABELS={vida:"Vida",cambio:"Cambio",x2:"x2"};

function R(){
  var root=document.getElementById("root");
  if(S.phase==="setup") root.innerHTML=renderSetup();
  else if(S.phase==="question") root.innerHTML=renderQuestion();
  else if(S.phase==="postcorrect") root.innerHTML=renderPostCorrect();
  else if(S.phase==="explain") root.innerHTML=renderExplain();
  else if(S.phase==="scores") root.innerHTML=renderScores();
  else if(S.phase==="impostor") root.innerHTML=renderImpostor();
  else if(S.phase==="end") root.innerHTML=renderEnd();
}

function renderSetup(){
  var h='<div class="card">';
  h+='<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">¿Cuántos equipos juegan?</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:1.25rem">';
  for(var n=2;n<=4;n++){
    var sel=S.numTeams===n;
    h+='<button style="flex:1;padding:10px;border-radius:10px;border:2px solid '+(sel?'#534AB7':'#E0DDD8')+';background:'+(sel?'#EEEDFE':'#fff')+';color:'+(sel?'#26215C':'#555')+';font-size:15px;font-weight:700;cursor:pointer;font-family:inherit" onclick="setNumTeams('+n+')">'+n+' equipos</button>';
  }
  h+='</div>';
  h+='<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">Nombres de los equipos</div>';
  for(var i=0;i<S.numTeams;i++){
    var c=TC[i];
    h+='<input class="setup-input" style="border-color:'+c.border+'" value="'+S.teams[i]+'" oninput="S.teams['+i+']=this.value" placeholder="Equipo '+(i+1)+'">';
  }
  h+='</div><button class="btn btn-purple" onclick="startGame()">&#9654; Empezar juego</button>';
  return h;
}

function setNumTeams(n){S.numTeams=n;R();}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
}

function startGame(){
  var n=S.numTeams;
  S.scores=[];S.coins=[];S.bets=[];S.activeCoins=[];S.teamAnswers=[];
  for(var i=0;i<n;i++){S.scores.push(0);S.coins.push(["vida","cambio","x2"]);S.bets.push(1);S.activeCoins.push(null);S.teamAnswers.push(null);}
  // Shuffle questions so each game is different
  var pool=ALL_QS.slice();
  shuffle(pool);
  QS=pool.slice(0,17);
  IMP=[];
  S.phase="question";S.ri=0;R();
}

function renderQuestion(){
  var rnd=ROUNDS[S.ri];
  var q=QS[rnd.qi];
  var isA=rnd.type==="apuesta";
  var isD=rnd.type==="doble";
  var pct=Math.round((S.ri/ROUNDS.length)*100);
  var badgeClass="badge-normal",badgeText="Ronda normal";
  if(isA){badgeClass="badge-apuesta";badgeText="Ronda apuesta — todos ven las opciones primero";}
  if(isD){badgeClass="badge-doble";badgeText="&#9733; Doble puntaje";}

  var h='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">';
  h+='<span style="font-size:12px;font-weight:600;color:#999">PREGUNTA '+(S.ri+1)+' DE '+ROUNDS.length+'</span>';
  var pts=S.teams.slice(0,S.numTeams).map(function(t,i){return t.split(" ")[0]+":"+S.scores[i];}).join(" · ");
  h+='<span style="font-size:11px;color:#999">'+pts+'</span></div>';
  h+='<div class="card"><span class="badge '+badgeClass+'">'+badgeText+'</span><div class="q-text">'+q.t+'</div>';

  if(isA&&!S.revealed){
    h+='<div style="font-size:13px;font-weight:600;color:#555;margin-bottom:.75rem">Apuesta de cada equipo (1-30):</div><div class="bet-row">';
    for(var i=0;i<S.numTeams;i++){
      var c=TC[i];
      h+='<div class="bet-card" style="background:'+c.bg+';border-color:'+c.border+'">';
      h+='<div class="bet-label" style="color:'+c.dark+'">'+S.teams[i]+'</div>';
      h+='<input class="bet-input" style="border-color:'+c.border+'" type="number" min="1" max="30" step="1" value="'+S.bets[i]+'" oninput="S.bets['+i+']=Math.min(30,Math.max(1,parseInt(this.value)||1))">';
      h+='</div>';
    }
    h+='</div>';
  }

  for(var i=0;i<q.o.length;i++){
    var cls="opt";
    if(S.revealed&&i===q.c) cls="opt opt-correct";
    else if(S.revealed) cls="opt opt-wrong";
    h+='<div class="'+cls+'">'+q.o[i]+'</div>';
  }
  h+='</div>';

  if(!S.revealed){
    h+='<div class="card"><div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">Comodines</div><div class="teams-grid">';
    for(var i=0;i<S.numTeams;i++){
      var c=TC[i];
      h+='<div class="tcard" style="background:'+c.bg+';border-color:'+c.border+'">';
      h+='<div class="tname" style="color:'+c.dark+'">'+S.teams[i]+'</div><div class="coins-row">';
      var ckeys=["vida","cambio","x2"];
      for(var k=0;k<ckeys.length;k++){
        var co=ckeys[k];
        var has=S.coins[i].indexOf(co)>=0;
        var act=S.activeCoins[i]===co;
        var cls2="coin"+(has?"":" coin-used")+(act?" coin-active":"");
        h+='<button class="'+cls2+'" onclick="toggleCoin('+i+',\''+co+'\')" '+(has?"":"disabled")+'>'+CLABELS[co]+'</button>';
      }
      h+='</div></div>';
    }
    h+='</div></div>';

    h+='<div class="card"><div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">Respuesta de cada equipo</div><div class="ans-grid">';
    for(var i=0;i<S.numTeams;i++){
      var c=TC[i];
      h+='<div class="ans-card" style="background:'+c.bg+';border-color:'+c.border+'">';
      h+='<div class="ans-teamname" style="color:'+c.dark+'">'+S.teams[i]+'</div><div class="ans-btns">';
      var letters=["A","B","C","D"];
      for(var k=0;k<4;k++){
        var sel=S.teamAnswers[i]===k;
        var cls2="ans-opt-btn"+(sel?" ans-opt-pending":"");
        h+='<button class="'+cls2+'" onclick="setAns('+i+','+k+')">'+letters[k]+'</button>';
      }
      h+='</div></div>';
    }
    h+='</div></div>';
    h+='<button class="btn btn-green" onclick="doReveal()">&#128065; Revelar respuesta</button>';
  }

  if(S.revealed){
    h+='<div class="card"><div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">Lo que eligió cada equipo</div><div class="ans-grid">';
    for(var i=0;i<S.numTeams;i++){
      var c=TC[i];
      var chosen=S.teamAnswers[i];
      var correct=chosen===q.c;
      h+='<div class="ans-card" style="background:'+c.bg+';border-color:'+c.border+'">';
      h+='<div class="ans-teamname" style="color:'+c.dark+'">'+S.teams[i]+'</div><div class="ans-btns">';
      var letters=["A","B","C","D"];
      for(var k=0;k<4;k++){
        var isSel=chosen===k;
        var cls2="ans-opt-btn";
        if(isSel) cls2+=(correct?" ans-opt-correct":" ans-opt-wrong");
        h+='<button class="'+cls2+'" disabled>'+letters[k]+'</button>';
      }
      h+='</div></div>';
    }
    h+='</div></div>';
    h+='<div class="reveal-box"><strong>&#10003; Respuesta correcta: '+q.o[q.c]+'</strong><p>'+q.exp+'</p></div>';
    h+='<button class="btn btn-purple" onclick="goPostCorrect()">Ver resultados &#8594;</button>';
  }
  return h;
}

function toggleCoin(t,c){
  if(S.coins[t].indexOf(c)<0) return;
  S.activeCoins[t]=S.activeCoins[t]===c?null:c;
  R();
}

function setAns(t,v){S.teamAnswers[t]=v;R();}

function doReveal(){
  for(var i=0;i<S.numTeams;i++){if(S.teamAnswers[i]===null){alert("Registrá la respuesta de todos los equipos.");return;}}
  var q=QS[ROUNDS[S.ri].qi];
  for(var i=0;i<S.numTeams;i++){
    if(S.teamAnswers[i]!==q.c&&S.activeCoins[i]==="cambio"){
      S.coins[i]=S.coins[i].filter(function(x){return x!=="cambio";});
      S.activeCoins[i]=null;
      S.teamAnswers[i]=null;
      alert(S.teams[i]+" usó Cambio — registrá su nueva respuesta.");
      R();return;
    }
  }
  S.revealed=true;R();
}

function goPostCorrect(){
  var rnd=ROUNDS[S.ri];
  var q=QS[rnd.qi];
  var isA=rnd.type==="apuesta";
  var isD=rnd.type==="doble";
  var winners=[];
  for(var i=0;i<S.numTeams;i++){
    if(S.teamAnswers[i]===q.c){
      var pts=isA?S.bets[i]:(isD?20:10);
      if(S.activeCoins[i]==="x2"){pts*=2;S.coins[i]=S.coins[i].filter(function(x){return x!=="x2";});}
      winners.push({i:i,pts:pts});
    }
  }
  if(winners.length===0){calcLosers();return;}
  S.postCorrect={winners:winners,cur:0};
  S.phase="postcorrect";R();
}

function renderPostCorrect(){
  var w=S.postCorrect.winners[S.postCorrect.cur];
  var c=TC[w.i];
  var h='<div class="card">';
  h+='<div style="font-size:16px;font-weight:700;color:'+c.dark+';margin-bottom:4px">&#10003; '+S.teams[w.i]+' acertó</div>';
  h+='<div style="font-size:13px;color:#777;margin-bottom:1rem">Ganó '+w.pts+' puntos. ¿Qué hace?</div>';
  h+='<button class="btn btn-green" onclick="chooseAction('+w.i+','+w.pts+',\'sumar\',-1)">+ Sumar '+w.pts+' puntos</button>';
  h+='<div style="font-size:13px;color:#999;text-align:center;margin:.5rem 0">— o robar 10 puntos a —</div>';
  for(var j=0;j<S.numTeams;j++){
    if(j===w.i) continue;
    var tc=TC[j];
    h+='<button class="action-btn" style="background:'+tc.bg+';border-color:'+tc.border+';color:'+tc.dark+'" onclick="chooseAction('+w.i+','+w.pts+',\'robar\','+j+')">&#9876; Robar 10 pts de '+S.teams[j]+' ('+S.scores[j]+' pts)</button>';
  }
  h+='</div>';
  return h;
}

function chooseAction(team,pts,action,target){
  if(action==="sumar") S.scores[team]+=pts;
  else{S.scores[team]+=pts;S.scores[target]-=10;}
  S.postCorrect.cur++;
  if(S.postCorrect.cur<S.postCorrect.winners.length){R();return;}
  calcLosers();
}

function calcLosers(){
  var rnd=ROUNDS[S.ri];
  var q=QS[rnd.qi];
  var isA=rnd.type==="apuesta";
  var isD=rnd.type==="doble";
  for(var i=0;i<S.numTeams;i++){
    if(S.teamAnswers[i]!==q.c){
      if(S.activeCoins[i]==="vida") S.coins[i]=S.coins[i].filter(function(x){return x!=="vida";});
      else{var pts=isA?S.bets[i]:(isD?20:10);S.scores[i]-=pts;}
    }
    S.activeCoins[i]=null;
  }
  S.explainQ=q;
  S.explainNext="scores";
  S.phase="explain";S.explainImg=null;R();
}


function renderExplain(){
  var q=S.explainQ;
  var h='<div style="text-align:center;margin-bottom:.5rem">';
  h+='<div style="display:inline-block;background:#1a1a1a;color:#fff;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.5px">EXPLICACIÓN</div></div>';

  // Illustration
  if(q.svi!==undefined){
    h+='<div style="margin-bottom:.875rem;border-radius:14px;overflow:hidden;border:1px solid #E8E6E0;background:#F0EEF8">'+SVGS[q.svi]+'</div>';
  }

  // Question + all options highlighted
  h+='<div class="card">';
  h+='<div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem;line-height:1.5">'+q.t+'</div>';
  var correctIdx=(q.c!==undefined)?q.c:(-1);
  var wrongIdx=(q.wrong!==undefined)?q.wrong:(-1);
  for(var i=0;i<q.o.length;i++){
    var isCorrect=(wrongIdx>=0)?(i!==wrongIdx):(i===correctIdx);
    var isWrong=(wrongIdx>=0)?(i===wrongIdx):(i!==correctIdx);
    var bg=isCorrect?"#27500A":isWrong?"#FCEBEB":"#fff";
    var border=isCorrect?"#27500A":isWrong?"#E24B4A":"#E0DDD8";
    var color=isCorrect?"#fff":isWrong?"#791F1F":"#1a1a1a";
    var weight=isCorrect?"700":"400";
    var icon=isCorrect?"✓ ":isWrong?"✗ ":"";
    h+='<div style="padding:9px 13px;border-radius:9px;border:1.5px solid '+border+';background:'+bg+';color:'+color+';font-size:12px;font-weight:'+weight+';margin-bottom:5px;line-height:1.4">'+icon+q.o[i]+'</div>';
  }
  h+='</div>';

  // Explanation
  h+='<div class="reveal-box"><strong>💡 ¿Por qué?</strong><p>'+q.exp+'</p></div>';
  var btnLabel=(S.explainNext==="afterImp"||( S.explainNext&&S.explainNext.indexOf("nextImpSub_")===0))?"Siguiente &#8594;":"Ver tabla de puntajes &#8594;";
  h+='<button class="btn btn-purple" onclick="goFromExplain()">'+btnLabel+'</button>';
  return h;
}

function goFromExplain(){
  var next=S.explainNext;
  S.explainNext=null;
  if(next==="afterImp"){afterImp();}
  else if(next&&next.indexOf("nextImpSub_")===0){nextImpSub();}
  else{S.phase="scores";R();}
}


function renderScores(){
  var sorted=S.scores.map(function(s,i){return{s:s,i:i};}).sort(function(a,b){return b.s-a.s;});
  var h='<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">Tabla de posiciones</div>';
  for(var k=0;k<sorted.length;k++){
    var x=sorted[k];
    var c=TC[x.i];
    var crown=k===0?"&#128081; ":"";
    h+='<div class="rank-row">';
    h+='<div class="rank-num">'+(k+1)+'</div>';
    h+='<span class="dot" style="background:'+c.border+'"></span>';
    h+='<div class="rank-name">'+crown+S.teams[x.i]+'</div>';
    h+='<div class="rank-score" style="color:'+c.dark+'">'+x.s+'</div>';
    h+='</div>';
  }
  var nextRnd=ROUNDS[S.ri+1];
  var isLast=S.ri===ROUNDS.length-1;
  h+='<div style="margin-top:1rem">';
  if(isLast) h+='<button class="btn btn-purple" onclick="goEnd()">&#127942; Ver ganador final</button>';
  else if(nextRnd&&nextRnd.type==="impostor") h+='<button class="btn btn-orange" onclick="goImpostor()">&#11088; Ronda especial</button>';
  else h+='<button class="btn btn-green" onclick="nextRound()">Siguiente pregunta &#8594;</button>';
  h+='</div>';
  return h;
}

function nextRound(){
  S.ri++;
  S.teamAnswers=Array(S.numTeams).fill(null);
  S.bets=Array(S.numTeams).fill(1);
  S.activeCoins=Array(S.numTeams).fill(null);
  S.revealed=false;S.phase="question";R();
}

function goImpostor(){S.phase="impostor";S.impSub=0;S.impPhase="show";S.impVotes={};R();}

function renderImpostor(){
  var sub=S.impSub;
  var q=IMP[sub];
  var letters=["A","B","C","D"];

  if(S.impPhase==="show"){
    var h='<div class="progress-bar"><div class="progress-fill" style="width:'+Math.round((S.ri/ROUNDS.length)*100)+'%"></div></div>';
    h+='<span class="badge badge-impostor">&#11088; Ronda especial — '+(sub+1)+' de 4</span>';
    h+='<div class="card"><div class="q-text">'+q.t+'</div>';
    h+='<div style="font-size:12px;color:#7D5A00;font-weight:600;margin-bottom:.75rem">&#9888;&#65039; 3 opciones son correctas — 1 es incorrecta. Encontrá la incorrecta.</div>';
    for(var i=0;i<q.o.length;i++) h+='<div class="opt">'+q.o[i]+'</div>';
    h+='</div>';
    // Answer grid
    h+='<div class="card"><div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:.75rem">Respuesta de cada equipo</div><div class="ans-grid">';
    for(var i=0;i<S.numTeams;i++){
      var c=TC[i];
      h+='<div class="ans-card" style="background:'+c.bg+';border-color:'+c.border+'">';
      h+='<div class="ans-teamname" style="color:'+c.dark+'">'+S.teams[i]+'</div><div class="ans-btns">';
      for(var k=0;k<4;k++){
        var sel=S.impVotes[i]===k;
        h+='<button class="ans-opt-btn'+(sel?" ans-opt-pending":"")+'" onclick="setImpVote('+i+','+k+')">'+letters[k]+'</button>';
      }
      h+='</div></div>';
    }
    h+='</div></div>';
    h+='<button class="btn btn-purple" onclick="resolveImp()">&#128065; Revelar respuesta</button>';
    return h;
  }

  if(S.impPhase==="results"){
    var h='<span class="badge badge-impostor">&#11088; Resultado ronda especial '+(sub+1)+' de 4</span>';
    h+='<div class="card" style="margin-bottom:.75rem">';
    h+='<div style="font-size:13px;color:#555;margin-bottom:.5rem">La opción INCORRECTA era:</div>';
    h+='<div style="background:#FCEBEB;border:1.5px solid #E24B4A;border-radius:8px;padding:.75rem;font-size:14px;font-weight:700;color:#791F1F">'+letters[q.wrong]+') '+q.o[q.wrong]+'</div></div>';
    h+='<div class="ans-grid">';
    for(var j=0;j<S.numTeams;j++){
      var jc=TC[j];
      var voted=S.impVotes[j];
      var correct=(voted!==undefined&&voted===q.wrong);
      h+='<div class="imp-vote-card" style="border-color:'+jc.border+';background:'+jc.bg+'">';
      h+='<div style="font-size:12px;font-weight:700;color:'+jc.dark+';margin-bottom:4px">'+S.teams[j]+'</div>';
      h+='<div style="font-size:13px;font-weight:600;color:'+(correct?"#27500A":"#A32D2D")+'">';
      if(voted===undefined) h+='Sin respuesta';
      else h+=(correct?'&#10003; +10 pts':'&#10007; -10 pts')+' — eligió '+letters[voted];
      h+='</div></div>';
    }
    h+='</div>';
    h+='<div class="reveal-box" style="margin-top:.75rem"><strong>&#10003; Explicación</strong><p>'+q.exp+'</p></div>';
    var isLast=sub===3;
    if(isLast) h+='<button class="btn btn-green" onclick="explainImp('+sub+')">Ver explicación &#8594;</button>';
    else h+='<button class="btn btn-purple" onclick="explainImp('+sub+')">Ver explicación &#8594;</button>';
    return h;
  }
  return "";
}

function explainImp(sub){
  var q=IMP[sub];
  S.explainQ=q;
  var isLast=sub===3;
  S.explainNext=isLast?"afterImp":"nextImpSub_"+sub;
  S.phase="explain";S.explainImg=null;R();
}

function setImpVote(j,k){S.impVotes[j]=k;R();}

function resolveImp(){
  var q=IMP[S.impSub];
  for(var j=0;j<S.numTeams;j++){
    var v=S.impVotes[j];
    if(v===undefined) continue;
    if(v===q.wrong) S.scores[j]+=10;
    else S.scores[j]-=10;
  }
  S.impPhase="results";R();
}

function nextImpSub(){S.impSub++;S.impPhase="show";S.impVotes={};R();}

function afterImp(){
  S.ri++;
  S.teamAnswers=Array(S.numTeams).fill(null);
  S.bets=Array(S.numTeams).fill(1);
  S.activeCoins=Array(S.numTeams).fill(null);
  S.revealed=false;S.phase="question";R();
}

function goEnd(){S.phase="end";R();}

function renderEnd(){
  var sorted=S.scores.map(function(s,i){return{s:s,i:i};}).sort(function(a,b){return b.s-a.s;});
  var w=sorted[0];
  var wc=TC[w.i];
  var h='<div class="card" style="text-align:center;border-color:'+wc.border+';margin-bottom:.875rem">';
  h+='<div style="font-size:13px;font-weight:600;color:#999;margin-bottom:4px">GANADOR</div>';
  h+='<div style="font-size:28px;font-weight:700;color:'+wc.dark+'">&#127942; '+S.teams[w.i]+'</div>';
  h+='<div style="font-size:20px;color:'+wc.dark+'">'+w.s+' puntos</div></div>';
  h+='<div class="card">';
  var medals=["&#129351;","&#129352;","&#129353;","4."];
  for(var k=0;k<sorted.length;k++){
    var x=sorted[k];
    var c=TC[x.i];
    h+='<div class="rank-row">';
    h+='<div class="rank-num">'+medals[k]+'</div>';
    h+='<span class="dot" style="background:'+c.border+'"></span>';
    h+='<div class="rank-name">'+S.teams[x.i]+'</div>';
    h+='<div class="rank-score" style="color:'+c.dark+'">'+x.s+' pts</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<button class="btn btn-gray" onclick="restartGame()">&#8635; Jugar de nuevo</button>';
  return h;
}

function restartGame(){
  S={phase:"setup",numTeams:4,teams:["Equipo 1","Equipo 2","Equipo 3","Equipo 4"],scores:[0,0,0,0],
  coins:[["vida","cambio","x2"],["vida","cambio","x2"],["vida","cambio","x2"],["vida","cambio","x2"]],
  ri:0,bets:[1,1,1,1],activeCoins:[null,null,null,null],teamAnswers:[null,null,null,null],
  revealed:false,postCorrect:null,impSub:0,impVotes:{},impPhase:"show",explainImg:null,explainQ:null,explainNext:null};
  // Re-shuffle questions for the new game
  var pool=ALL_QS.slice();
  shuffle(pool);
  QS=pool.slice(0,17);
  IMP=[];
  R();
}

R();
</script>
</body>
</html>
